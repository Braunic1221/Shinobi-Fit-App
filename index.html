<div class="card"><b>${done} von ${total} Aufgaben erledigt</b><div class="progress"><div style="width:${total?Math.min(100,done/total*100):0}%"></div></div></div>
${exercises.map((x,i)=>{const skipped=!!c.skipped[i];return `<div class="card ${x.optional?'optional':''} ${skipped?'exercise-skipped':''}"><div class="top"><div><h3 style="margin:0">${i+1}. ${x.name}</h3><div class="meta">${x.scheme} · ${x.muscles}${x.replacedFrom?`<br>Heute ersetzt: ${x.replacedFrom} → ${x.name}`:''}</div></div>${x.optional?'<span class="badge">optional</span>':''}</div>${skipped?'<div class="skip-banner">⏭️ Für diese Mission übersprungen</div>':previousHtml(x)}<div class="replace-row"><select data-replace-select="${i}" ${skipped?'disabled':''}><option value="">Gerät besetzt? Alternative wählen …</option>${EXERCISE_LIBRARY.filter(y=>y.name!==x.name).map(y=>`<option value="${y.name}">${y.name}</option>`).join('')}</select><button class="btn secondary" data-confirm-replace="${i}" ${skipped?'disabled':''}>Ersetzen</button><button class="btn secondary" data-skip-exercise="${i}">${skipped?'Wieder aktivieren':'Überspringen'}</button></div><div class="sets">${Array.from({length:setCount(x.scheme)},(_,j)=>{let q=i+'-'+j;return `<div class="set"><small>Satz ${j+1}</small><input inputmode="decimal" data-w="${q}" placeholder="kg" value="${c.values[q]||''}"><input inputmode="numeric" data-r="${q}" placeholder="Wdh." value="${c.reps[q]||''}"><button data-d="${q}" class="${c.done[q]&&Number(c.reps[q])>0?'done':''}">${c.done[q]&&Number(c.reps[q])>0?'✓ Fertig':'Abhaken'}</button></div>`}).join('')}</div><div class="tip"><b>Technik:</b> ${x.tip}</div><label style="margin-top:12px">Notiz zur Übung</label><input class="field" data-note="${i}" placeholder="z. B. Sitz höher einstellen" value="${c.exerciseNotes[i]||''}"></div>`}).join('')}
<div class="card"><h3>Weitere Übung hinzufügen</h3><div class="grid2"><select id="extraExercise"><option value="">Übung auswählen …</option>${EXERCISE_LIBRARY.map(x=>`<option value="${x.name}">${x.name}</option>`).join('')}</select><button class="btn primary" id="addExercise">Hinzufügen</button></div></div>
<div class="card"><h3>Kalorienschätzung</h3><div class="grid2"><div><label>Krafttraining (Min.)</label><input class="field" inputmode="numeric" id="smin" value="${c.strengthMinutes}"></div><div><label>Belastung</label><select id="effort">${['locker','mittel','hoch'].map(x=>`<option ${c.effort===x?'selected':''}>${x}</option>`).join('')}</select></div></div><div class="kcal">ca. ${e.total} kcal</div><div class="small">Cardio ${e.cardio} · Kraft ${e.strength} kcal. MET-basierte Näherung.</div></div><div class="card"><label>Notiz</label><textarea id="notes">${c.notes}</textarea></div><div class="card bottom-finish-card"><div class="small" style="margin-bottom:9px">Du bist am Ende der Mission angekommen.</div><button class="btn primary" data-finish-mission>${c.editingIndex!==undefined?'Änderungen speichern':'🥷 Mission abschließen'}</button></div>`}
function estimate(c){let w=+s.profile.currentWeight||70,M={Laufband:[3.5,5,7],'Laufband mit Steigung':[4.5,6.5,8.5],Stepper:[5,7,9],Fahrrad:[4,6,8],Crosstrainer:[4.5,6.5,8],Ruderergometer:[4,6,8],Sonstiges:[3.5,5.5,7.5]},ix={locker:0,mittel:1,intensiv:2}[c.cardio.intensity],cardio=Math.round((M[c.cardio.type]||M.Sonstiges)[ix]*3.5*w/200*(+c.cardio.minutes||0));if(+c.cardio.device>0)cardio=Math.round((cardio+(+c.cardio.device))/2);let sm={locker:3,mittel:4.5,hoch:6}[c.effort],strength=Math.round(sm*3.5*w/200*(+c.strengthMinutes||0));return{cardio,strength,total:cardio+strength}}
function personalRecords(){const best={};for(const h of s.history){const names=exerciseNamesForRecord(h);names.forEach((name,i)=>{if(h.skipped?.[i])return;for(let j=0;j<6;j++){const q=i+'-'+j;if(!validCompletedSet(h,q))continue;const w=Number(h.values[q]),r=Number(h.reps[q]),clean=name.replace(' · optional','');if(!best[clean]||w>best[clean].weight||(w===best[clean].weight&&r>best[clean].reps))best[clean]={weight:w,reps:r,date:h.date}}})}return best}
function missionStats(h){const names=exerciseNamesForRecord(h);let sets=0,completedExercises=0,activeExercises=0;names.forEach((n,i)=>{if(h.skipped?.[i])return;activeExercises++;let has=false;for(let j=0;j<6;j++){const q=i+'-'+j;if(validCompletedSet(h,q)){sets++;has=true}}if(has)completedExercises++});const cardio=!!h.cardio?.done;const completion=activeExercises?Math.round((completedExercises+(cardio?1:0))/(activeExercises+1)*100):(cardio?100:0);return{sets,completedExercises,activeExercises,completion}}
function missionGrade(h){const st=missionStats(h),score=st.completion+(st.sets>=18?8:st.sets>=10?4:0)+(h.cardio?.done?5:0);return score>=108?'SS':score>=98?'S':score>=88?'A':score>=74?'B':score>=55?'C':'D'}
function workoutDuration(h){const end=new Date(h.completedAt||h.date),start=new Date(h.startedAt||h.date);const min=Math.round((end-start)/60000);return Number.isFinite(min)&&min>0&&min<360?min:(Number(h.strengthMinutes)||0)+(h.cardio?.done?Number(h.cardio.minutes)||0:0)}
function streakWeeks(){const weeks=new Map;for(const h of s.history){const d=new Date(h.date),day=(d.getDay()+6)%7,monday=new Date(d);monday.setDate(d.getDate()-day);const key=monday.toISOString().slice(0,10);weeks.set(key,(weeks.get(key)||0)+1)}let count=0,d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));while((weeks.get(d.toISOString().slice(0,10))||0)>=3){count++;d.setDate(d.getDate()-7)}return count}
function periodSummary(months=1){const now=new Date(),from=new Date(now);from.setMonth(now.getMonth()-months+1,1);let trainings=0,sets=0,cardioMin=0,kcal=0,prs=0;const allPR=personalRecords();for(const h of s.history){if(new Date(h.date)<from)continue;trainings++;sets+=missionStats(h).sets;cardioMin+=h.cardio?.done?Number(h.cardio.minutes)||0:0;kcal+=h.kcal??estimate(h).total}prs=Object.values(allPR).filter(x=>new Date(x.date)>=from).length;return{trainings,sets,cardioMin,kcal,prs}}
function muscleSummary(){const out={Brust:0,Rücken:0,Schultern:0,Beine:0,Po:0,Bauch:0,Trapez:0};for(const h of s.history.slice(0,12)){const names=exerciseNamesForRecord(h);names.forEach((n,i)=>{if(h.skipped?.[i])return;let done=false;for(let j=0;j<6;j++)if(validCompletedSet(h,i+'-'+j))done=true;if(!done)return;const exr=EXERCISE_LIBRARY.find(x=>x.name===n);const m=exr?.muscles||'';Object.keys(out).forEach(k=>{if(m.toLowerCase().includes(k.toLowerCase())||(k==='Schultern'&&m.includes('Schulter'))||(k==='Beine'&&(m.includes('Bein')||m.includes('Oberschenkel'))))out[k]++})})}return out}
function dashboard(){const latest=s.measurements.at(-1),first=s.measurements[0],metrics=['Gewicht','Bauchnabel','Hüfte','Brustwarze','Schenkel','Arm','Arm angespannt'];let selected=s.dashboardMetrics||['Gewicht'];if(selected.includes('Gewicht')&&selected.length>1)selected=['Gewicht'];if(!selected.length)selected=['Gewicht'];s.dashboardMetrics=selected;const delta=k=>{const v=(latest[k]??0)-(first[k]??0);return(v>0?'+':'')+v.toFixed(1)+(k==='Gewicht'?' kg':' cm')};const calorieItems=[];if(s.current){const e=estimate(s.current);calorieItems.push({id:'current',label:'Heute · laufende Mission',total:e.total,cardio:e.cardio,strength:e.strength})}s.history.forEach((h,i)=>{const c=estimate(h);calorieItems.push({id:'h'+i,label:new Date(h.date).toLocaleDateString('de-DE')+' · Mission '+h.day,total:h.kcal??c.total,cardio:c.cardio,strength:c.strength})});const selectedCalories=s.dashboardCalorieDay||calorieItems[0]?.id||'';const kcal=calorieItems.find(x=>x.id===selectedCalories)||calorieItems[0]||{total:0,cardio:0,strength:0};app.innerHTML=`${brand()}<h2 class="scroll-title">Interaktives Fortschritts-Dashboard</h2><div class="metric-grid">${metrics.map(k=>`<div class="metric-card"><div class="small">${k}</div><strong>${latest[k]??'-'}${k==='Gewicht'?' kg':' cm'}</strong><div class="small">${delta(k)} seit Start</div></div>`).join('')}</div><div class="card"><b>Messwerte im Diagramm</b><div class="filter-row">${metrics.map(k=>`<button class="filter-chip ${selected.includes(k)?'active':''}" data-metric="${k}">${k}</button>`).join('')}</div><div class="metric-mode-note">Gewicht wird immer allein in Kilogramm dargestellt. Alle Körperumfänge lassen sich miteinander kombinieren und bleiben auf einer gemeinsamen Zentimeter-Achse.</div><div id="chartLegend" class="legend"></div><div class="chart-axis-top" id="chartModeTitle">Darstellung</div><div class="chart-wrap"><canvas id="dynamicChart" class="chart"></canvas></div><div class="chart-note" id="chartExplanation"></div></div><div class="card"><h3 style="margin-top:0">Kalorien nach Trainingstag</h3><label>Tag auswählen</label><select id="calorieDay">${calorieItems.length?calorieItems.map(x=>`<option value="${x.id}" ${x.id===selectedCalories?'selected':''}>${x.label}</option>`).join(''):'<option>Noch kein Training gespeichert</option>'}</select><div class="kcal-grid"><div class="kcal-card"><div class="small">Gesamt</div><strong>ca. ${kcal.total} kcal</strong></div><div class="kcal-card"><div class="small">Cardio</div><strong>${kcal.cardio} kcal</strong></div><div class="kcal-card"><div class="small">Krafttraining</div><strong>${kcal.strength} kcal</strong></div></div><div class="chart-note">Die Werte sind MET-basierte Schätzungen und keine exakte Messung.</div></div>${(()=>{const mo=periodSummary(1),yr=periodSummary(12);return `<div class="card"><h3 style="margin-top:0">Monats- und Jahresrückblick</h3><div class="summary-grid"><div class="summary-card"><strong>${mo.trainings}</strong>Trainings im Monat</div><div class="summary-card"><strong>${mo.cardioMin}</strong>Cardio-Minuten</div><div class="summary-card"><strong>${yr.trainings}</strong>Trainings in 12 Monaten</div><div class="summary-card"><strong>${yr.sets}</strong>Sätze in 12 Monaten</div></div></div>`})()}<div class="card"><h3 style="margin-top:0">Persönliche Rekorde</h3><div class="grid2">${Object.entries(personalRecords()).sort((a,b)=>b[1].weight-a[1].weight).map(([name,v])=>`<div class="metric-card"><div class="small">${name}</div><strong>${v.weight} kg</strong><div class="small">${v.reps} Wdh. · ${new Date(v.date).toLocaleDateString('de-DE')}</div></div>`).join('')||'<div class="small">Noch keine Kraftwerte gespeichert.</div>'}</div></div><div class="card"><h3>Neue Messung</h3><div class="grid2">${['date',...metrics].map(x=>`<div><label>${x==='date'?'Datum':x}</label><input class="field mi" data-m="${x}" type="${x==='date'?'date':'number'}" step="0.1"></div>`).join('')}</div><button class="btn primary" id="addm" style="margin-top:12px">Speichern</button></div><div class="card scroll"><table><tr><th>Datum</th><th>Gew.</th><th>Bauch</th><th>Hüfte</th><th>Brust</th><th>Schenkel</th><th>Arm</th><th>Arm ang.</th></tr>${s.measurements.map(x=>`<tr><td>${new Date(x.date).toLocaleDateString('de-DE')}</td><td>${x.Gewicht}</td><td>${x.Bauchnabel??'–'}</td><td>${x.Hüfte??'–'}</td><td>${x.Brustwarze??'–'}</td><td>${x.Schenkel??'–'}</td><td>${x.Arm??'–'}</td><td>${x['Arm angespannt']??'–'}</td></tr>`).join('')}</table></div>`;setTimeout(()=>drawDynamicChart(selected),0)}
function drawDynamicChart(selected){const colors=['#ff9b2f','#ff5d3d','#ffd057','#65d08b','#a58cff','#67cfff','#ff84c8'];const isWeight=selected.length===1&&selected[0]==='Gewicht';const series=selected.map((k,i)=>({name:k,values:s.measurements.map(x=>Number(x[k])||0),color:colors[i%colors.length],unit:isWeight?'kg':'cm'}));const legend=document.getElementById('chartLegend');if(legend)legend.innerHTML=series.map(q=>`<div class="legend-item"><span class="legend-dot" style="background:${q.color};box-shadow:0 0 8px ${q.color}88"></span><span>${q.name}: <b>${q.values.at(-1).toFixed(1)} ${q.unit}</b></span></div>`).join('');const title=document.getElementById('chartModeTitle');if(title)title.textContent=isWeight?'Gewichtsverlauf (kg)':'Umfangsverlauf (cm)';const explanation=document.getElementById('chartExplanation');if(explanation)explanation.textContent=isWeight?'Die horizontale Achse zeigt das Datum, die vertikale Achse dein Gewicht in Kilogramm.':'Die horizontale Achse zeigt das Datum, die vertikale Achse die ausgewählten Körperumfänge in Zentimetern.';const canvas=document.getElementById('dynamicChart');if(!canvas||!series.length)return;const width=Math.max(320,canvas.clientWidth),height=300,dpr=Math.min(window.devicePixelRatio||1,2);canvas.width=width*dpr;canvas.height=height*dpr;const ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,width,height);const left=48,right=14,top=24,bottom=46;let values=series.flatMap(q=>q.values),min=Math.min(...values),max=Math.max(...values);if(min===max){min-=1;max+=1}const rawRange=max-min,stepBase=rawRange/4,magnitude=Math.pow(10,Math.floor(Math.log10(stepBase||1))),niceStep=Math.max(magnitude,Math.ceil(stepBase/magnitude)*magnitude);min=Math.floor((min-niceStep*.35)/niceStep)*niceStep;max=Math.ceil((max+niceStep*.35)/niceStep)*niceStep;const range=max-min||1;ctx.font='600 12px -apple-system,sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';for(let i=0;i<=4;i++){const ratio=i/4,y=top+(height-top-bottom)*ratio,value=max-range*ratio;ctx.strokeStyle='rgba(255,209,159,.13)';ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(width-right,y);ctx.stroke();ctx.fillStyle='#efd6c7';ctx.fillText(value.toFixed(value<10?1:0),left-8,y)}ctx.textAlign='center';ctx.textBaseline='top';ctx.font='600 11px -apple-system,sans-serif';s.measurements.forEach((m,i)=>{const x=left+i*((width-left-right)/(s.measurements.length-1||1));ctx.fillStyle='#d8bfb1';ctx.fillText(new Date(m.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}),x,height-bottom+13)});ctx.fillStyle='#ffcc91';ctx.font='700 11px -apple-system,sans-serif';ctx.textAlign='left';ctx.fillText(isWeight?'Gewicht (kg)':'Umfang (cm)',left,9);series.forEach(q=>{const pts=q.values.map((v,i)=>({x:left+i*((width-left-right)/(q.values.length-1||1)),y:top+(max-v)/range*(height-top-bottom)}));ctx.save();ctx.strokeStyle=q.color;ctx.lineWidth=3;ctx.lineJoin='round';ctx.lineCap='round';ctx.shadowColor=q.color;ctx.shadowBlur=9;ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.restore();pts.forEach((p,i)=>{ctx.fillStyle='#120a07';ctx.strokeStyle=q.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();ctx.stroke();if(i===0||i===pts.length-1){ctx.fillStyle='#fff6ec';ctx.font='700 10px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(`${q.values[i].toFixed(1)} ${q.unit}`,p.x,Math.max(top,p.y-18))}})})}
function chart(id,series){let c=document.getElementById(id),ctx=c.getContext('2d'),w=c.width=c.clientWidth*2,h=c.height=420,vals=series.flatMap(x=>x.v),mn=Math.min(...vals),mx=Math.max(...vals),pad=45,col=['#ff8a1f','#ff5a36'];ctx.scale(2,2);ctx.strokeStyle='#4b2a1d';for(let i=0;i<4;i++){let y=25+i*50;ctx.beginPath();ctx.moveTo(20,y);ctx.lineTo(w/2-20,y);ctx.stroke()}series.forEach((q,z)=>{ctx.strokeStyle=col[z];ctx.lineWidth=3;ctx.beginPath();q.v.forEach((v,i)=>{let x=25+i*((w/2-50)/(q.v.length-1||1)),y=180-(v-mn)/(mx-mn||1)*140;i?ctx.lineTo(x,y):ctx.moveTo(x,y);ctx.fillStyle=col[z];ctx.fillRect(x-3,y-3,6,6)});ctx.stroke();ctx.fillStyle=col[z];ctx.fillText(q.n,25+z*85,15)})}
function charts(){chart('cw',[{n:'Gewicht',v:s.measurements.map(x=>x.Gewicht)}]);chart('cm',[{n:'Bauch',v:s.measurements.map(x=>x.Bauchnabel)},{n:'Hüfte',v:s.measurements.map(x=>x.Hüfte)}])}
function history(){app.innerHTML=`${brand()}<h2>Missionsverlauf</h2>${s.lastMissionResult?`<div class="card rank-result pr-flash"><div class="small">Letzte Missionsbewertung</div><div class="rank-letter">${s.lastMissionResult.grade}</div><b>${s.lastMissionResult.sets} Sätze · ${s.lastMissionResult.completion}% abgeschlossen</b><div class="meta">${s.lastMissionResult.duration} Min. · ${s.lastMissionResult.newPRs} neue Rekorde</div></div>`:''}${s.history.length?s.history.map((x,i)=>{const st=missionStats(x);return `<div class="card history-card"><div class="top"><div><b>Mission ${x.day} · ${x.title}</b><div class="meta">${new Date(x.date).toLocaleString('de-DE')} · ${workoutDuration(x)} Min.</div></div><span class="mission-rank">${missionGrade(x)}-Rang</span></div><div class="meta" style="margin-top:8px">${x.cardio?.done?(x.cardio?.type||'Cardio')+' '+(x.cardio?.minutes||0)+' Min.':'Cardio nicht absolviert'} · ca. ${x.kcal??estimate(x).total} kcal<br>${st.sets} absolvierte Sätze · ${st.completion}% der Mission</div><div class="history-actions"><button class="btn primary" data-view-history="${i}">Zusammenfassung ansehen</button><button class="btn-edit" data-edit-history="${i}">Bearbeiten</button><button class="btn-delete" data-delete-history="${i}">Löschen</button></div></div>`}).join(''):'<div class="card">Noch keine Mission abgeschlossen.</div>'}`}
function missionSummary(i){const x=s.history[i];if(!x){view='history';render();return}const names=exerciseNamesForRecord(x),st=missionStats(x),grade=missionGrade(x),duration=workoutDuration(x);app.innerHTML=`<button class="btn secondary back-from-summary" id="summaryBack">← Zum Verlauf</button><div id="summaryCapture"><div class="readonly-hero"><div class="small">ABGESCHLOSSENE MISSION</div><div class="share-card-title">Mission ${x.day}</div><div>${x.title}</div><div class="rank-letter">${grade}</div><b>${new Date(x.date).toLocaleDateString('de-DE')} · ${duration} Minuten</b></div><div class="summary-grid" style="margin-top:12px"><div class="summary-card"><strong>${st.sets}</strong>Sätze</div><div class="summary-card"><strong>${st.completion}%</strong>abgeschlossen</div><div class="summary-card"><strong>${x.cardio?.done?Number(x.cardio.minutes)||0:0}</strong>Cardio-Minuten</div><div class="summary-card"><strong>${x.kcal??estimate(x).total}</strong>ca. kcal</div></div><div class="card"><h3 style="margin-top:0">Cardio</h3>${x.cardio?.done?`<b>${x.cardio.type||'Cardio'} · ${x.cardio.minutes||0} Min.</b><div class="meta">Intensität: ${x.cardio.intensity||'–'}${x.cardio.device?` · Gerät: ${x.cardio.device} kcal`:''}</div>`:'<div class="meta">Nicht absolviert</div>'}</div><div class="card"><h3 style="margin-top:0">Krafttraining</h3>${names.map((name,ei)=>{if(x.skipped?.[ei])return `<div class="readonly-exercise"><b>${ei+1}. ${name}</b><div class="small">⏭️ Übersprungen</div></div>`;const sets=[];for(let j=0;j<6;j++){const q=ei+'-'+j;if(validCompletedSet(x,q))sets.push(`<span class="readonly-set">Satz ${j+1}: ${x.values[q]} kg × ${x.reps[q]}</span>`)}return `<div class="readonly-exercise"><b>${ei+1}. ${name}</b><div class="readonly-sets">${sets.length?sets.join(''):'<span class="small">Nicht absolviert</span>'}</div>${x.exerciseNotes?.[ei]?`<div class="small" style="margin-top:7px">Notiz: ${x.exerciseNotes[ei]}</div>`:''}</div>`}).join('')}</div>${x.notes?`<div class="card"><b>Trainingsnotiz</b><div class="meta">${x.notes}</div></div>`:''}<div class="share-card-footer">SHINOBI FIT · ${grade}-RANG</div></div><div class="readonly-actions"><button class="btn primary" data-edit-history="${i}">✏️ Mission bearbeiten</button><button class="btn secondary" id="cardMode">📷 Trainingskarte anzeigen</button></div>`}
function more(){app.innerHTML=`${brand()}<h2>Mehr</h2><div class="card"><label>Aktuelles Gewicht</label><input class="field" id="weight" value="${s.profile.currentWeight}"><button class="btn primary" id="savew" style="margin-top:10px">Speichern</button></div><div class="card"><b>Kalorienhinweis</b><div class="meta">Eine exakte Berechnung aus Trainingsgewicht und Wiederholungen ist nicht möglich. Die App schätzt mit Körpergewicht, Dauer, Intensität und MET-Werten.</div></div><div class="card"><b>Trapez & Haltung</b><div class="meta">Shrugs stehen in jeder Mission optional am Ende. Bei ausstrahlenden Schmerzen, Taubheit, Kraftverlust oder anhaltender Verschlechterung bitte medizinisch bzw. physiotherapeutisch abklären.</div></div><div class="card"><button class="btn secondary" id="export">Daten exportieren</button> <button class="btn secondary" id="importBtn">Backup importieren</button><input id="importFile" type="file" accept="application/json,.json" hidden> <button class="btn secondary" id="reset">Daten löschen</button></div>`}

  const i=Number(btn.dataset.editHistory);

document.querySelectorAll('[data-delete-history]').forEach(btn=>btn.onclick=()=>{

const calorieDay=document.getElementById('calorieDay');

document.querySelectorAll('[data-metric]').forEach(b=>b.onclick=()=>{s.dashboardMetrics=s.dashboardMetrics||['Gewicht'];const k=b.dataset.metric;if(k==='Gewicht')s.dashboardMetrics=['Gewicht'];else{if(s.dashboardMetrics.includes('Gewicht'))s.dashboardMetrics=[k];else if(s.dashboardMetrics.includes(k)){if(s.dashboardMetrics.length>1)s.dashboardMetrics=s.dashboardMetrics.filter(x=>x!==k)}else s.dashboardMetrics.push(k)}save();render()});document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{view=b.dataset.v;render()});document.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{const target=b.dataset.day;if(s.current&&s.current.day!==target){const choice=confirm(`Mission ${s.current.day} läuft bereits. OK = fortsetzen, Abbrechen = laufende Mission verwerfen und Mission ${target} starten.`);if(choice){view='day-'+s.current.day;render();return}else{s.current=null;save()}}view='day-'+target;render()});let q=id=>document.getElementById(id);

document.querySelectorAll('[data-d]').forEach(x=>x.onclick=()=>{const key=x.dataset.d;if(!s.current.done[key]&&Number(s.current.reps[key])<=0)return alert('Bitte zuerst gültige Wiederholungen eintragen.');s.current.done[key]=!s.current.done[key];const [ei,si]=key.split('-').map(Number);let nextKey=null;if(s.current.done[key]){for(let i=ei;i<s.current.exercises.length&&!nextKey;i++){const start=i===ei?si+1:0;for(let j=start;j<setCount(s.current.exercises[i].scheme);j++){const candidate=i+'-'+j;if(!s.current.done[candidate]){nextKey=candidate;break}}}}save();render();if(nextKey)setTimeout(()=>{const field=document.querySelector(`[data-r="${nextKey}"]`);if(field){field.focus();field.select()}},0)});
[['ctype','type'],['cmin','minutes'],['cint','intensity'],['cdevice','device']].forEach(([id,k])=>{if(q(id)){q(id).oninput=()=>{s.current.cardio[k]=q(id).value;save()};q(id).onchange=()=>{s.current.cardio[k]=q(id).value;save();if(id==='ctype'||id==='cint')render()}}});

document.querySelectorAll('[data-confirm-replace]').forEach(btn=>btn.onclick=()=>{const i=Number(btn.dataset.confirmReplace),sel=document.querySelector(`[data-replace-select="${i}"]`);if(!sel?.value)return alert('Bitte zuerst eine Alternative auswählen.');const old=s.current.exercises[i],replacement=JSON.parse(JSON.stringify(EXERCISE_LIBRARY.find(x=>x.name===sel.value)));replacement.replacedFrom=old.replacedFrom||old.name;s.current.exercises[i]=replacement;s.current.skipped[i]=false;for(let j=0;j<6;j++){delete s.current.values[i+'-'+j];delete s.current.reps[i+'-'+j];delete s.current.done[i+'-'+j]}const prev=previousExercise(replacement.name);if(prev)for(let j=0;j<setCount(replacement.scheme);j++){const set=prev.sets[j]||prev.sets.at(-1);if(set){s.current.values[i+'-'+j]=set.w;s.current.reps[i+'-'+j]=set.r}}save();render()});
document.querySelectorAll('[data-skip-exercise]').forEach(btn=>btn.onclick=()=>{const i=Number(btn.dataset.skipExercise);s.current.skipped[i]=!s.current.skipped[i];if(s.current.skipped[i]){for(let j=0;j<6;j++)s.current.done[i+'-'+j]=false;s.lastSkipped={index:i,name:s.current.exercises[i].name}}save();render();if(s.current.skipped[i]){const t=document.createElement('div');t.className='toast';t.innerHTML=`${s.current.exercises[i].name} übersprungen · <u>erneut tippen zum Aktivieren</u>`;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}});
if(q('addExercise'))q('addExercise').onclick=()=>{const name=q('extraExercise').value;if(!name)return alert('Bitte zuerst eine Übung auswählen.');const item=JSON.parse(JSON.stringify(EXERCISE_LIBRARY.find(x=>x.name===name)));const i=s.current.exercises.length;s.current.exercises.push(item);const prev=previousExercise(name);if(prev)for(let j=0;j<setCount(item.scheme);j++){const set=prev.sets[j]||prev.sets.at(-1);if(set){s.current.values[i+'-'+j]=set.w??'';s.current.reps[i+'-'+j]=set.r??''}}save();render()};
const finishMission=()=>{const completedSets=Object.entries(s.current.done||{}).filter(([q,v])=>v&&!s.current.skipped?.[Number(q.split('-')[0])]&&Number(s.current.reps[q])>0).length;if(!s.current.cardio.done&&!completedSets)return alert('Die Mission ist noch leer. Bitte mindestens Cardio oder einen gültigen Satz absolvieren.');let e=estimate(s.current),p=PLANS[s.current.day],editingIndex=s.current.editingIndex,before=personalRecords();const record={...s.current,title:p.title,kcal:e.total,exerciseNames:s.current.exercises.map(x=>x.name),completedAt:new Date().toISOString()};delete record.editingIndex;if(editingIndex!==undefined&&s.history[editingIndex])s.history[editingIndex]=record;else s.history.unshift(record);s.history.sort((a,b)=>new Date(b.date)-new Date(a.date));recalcChakra();const after=personalRecords(),newPRs=Object.keys(after).filter(k=>!before[k]||after[k].weight>before[k].weight||(after[k].weight===before[k].weight&&after[k].reps>before[k].reps)).length,st=missionStats(record);s.lastMissionResult={grade:missionGrade(record),sets:st.sets,completion:st.completion,duration:workoutDuration(record),newPRs};s.current=null;save();view='summary-'+s.history.indexOf(record);render()};document.querySelectorAll('[data-finish-mission]').forEach(btn=>btn.onclick=finishMission);if(q('addm'))q('addm').onclick=()=>{let m={};document.querySelectorAll('.mi').forEach(x=>{const k=x.dataset.m;m[k]=k==='date'?x.value:(x.value.trim()===''?null:Number(x.value))});if(!m.date||m.Gewicht===null||!Number.isFinite(m.Gewicht))return alert('Bitte Datum und Gewicht eintragen.');s.measurements.push(m);carryForwardMeasurements();s.profile.currentWeight=m.Gewicht;save();render()};if(q('savew'))q('savew').onclick=()=>{s.profile.currentWeight=+q('weight').value||s.profile.currentWeight;save();render()};if(q('export'))q('export').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(s,null,2)],{type:'application/json'}));a.download='shinobi-fit-backup.json';a.click()};if(q('importBtn'))q('importBtn').onclick=()=>q('importFile').click();if(q('importFile'))q('importFile').onchange=async()=>{const file=q('importFile').files?.[0];if(!file)return;try{const data=JSON.parse(await file.text());if(!data||typeof data!=='object'||!Array.isArray(data.history)||!Array.isArray(data.measurements))throw new Error('Ungültiges Backup');s=data;s.history=s.history||[];s.measurements=s.measurements||INITIAL;s.profile=s.profile||{currentWeight:70,targetWeight:65};s.current=s.current||null;s.xp=s.xp||0;s.lastMissionResult=s.lastMissionResult||null;migrateSeedHistory();recalcChakra();save();alert('Backup erfolgreich importiert.');view='home';render()}catch(e){alert('Das Backup konnte nicht importiert werden.')}finally{q('importFile').value=''}};if(q('reset'))q('reset').onclick=()=>{if(confirm('Alle lokalen Daten löschen?')){localStorage.removeItem(KEY);location.reload()}}}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});render();
